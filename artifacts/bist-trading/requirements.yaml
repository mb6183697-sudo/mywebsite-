packages:
  "framer-motion": "Animations for ticker, page transitions, and modals"
  "recharts": "For portfolio and admin charts"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes safely"
  "date-fns": "For formatting dates in history and news"
  "date-fns/locale": "Turkish locale for dates"
  "@hookform/resolvers": "Form validation"
  "react-hook-form": "Form management"

images:
  - path: "artifacts/bist-trading/public/images/logo.png"
    description: "A professional logo for a financial trading platform named '1000 Yatırımlar'. The text should be dark navy blue with a subtle dark red accent. Clean, minimalist, and corporate on a white or transparent background."
    aspect_ratio: "16:9"
  - path: "artifacts/bist-trading/public/images/hero-bg.png"
    description: "A subtle, abstract financial background featuring softly glowing green and red stock market candlestick charts fading into a dark navy and crimson gradient mesh."
    aspect_ratio: "16:9"

notes:
  - "The API is generated via OpenAPI. Hooks are imported from @workspace/api-client-react"
  - "Authentication token should be stored in localStorage as 'auth_token'"
