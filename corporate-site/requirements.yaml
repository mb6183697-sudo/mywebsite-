packages:
  "framer-motion": "For premium, smooth scroll-triggered animations and page transitions"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes safely"
  "lucide-react": "For crisp, modern icons used across the features and services sections"
  "react-hook-form": "For robust contact form state management and validation"
  "@hookform/resolvers": "For integrating Zod validation with react-hook-form"
  "zod": "For contact form schema validation"

